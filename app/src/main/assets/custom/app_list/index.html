<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приложения - Veritas UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <button class="back-button" id="backButton">← Назад</button>
    <div class="title" id="pageTitle">Все приложения</div>
</div>

<div class="search-container">
    <input
            type="text"
            class="search-input"
            placeholder="Поиск приложений..."
            id="searchInput"
    >
</div>

<div class="filters" id="filters">
    <button class="filter-button active" data-filter="all">Все</button>
    <button class="filter-button" data-filter="enabled">Включенные</button>
    <button class="filter-button" data-filter="disabled">Отключенные</button>
    <button class="filter-button" data-filter="system">Системные</button>
    <button class="filter-button" data-filter="user">Пользовательские</button>
</div>

<div class="apps-grid" id="appsGrid">
    <!-- Приложения будут загружены здесь -->
</div>

<div id="loading" class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загрузка приложений...</div>
</div>

<div id="emptyState" class="empty-state" style="display: none;">
    <div class="empty-state-icon">📱</div>
    <div class="empty-state-text">Приложения не найдены</div>
    <div class="empty-state-subtext">Попробуйте изменить поисковый запрос</div>
</div>

<script src="script.js"></script>
</body>
</html>
